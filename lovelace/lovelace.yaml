type: vertical-stack
cards:
  # ==================== 咖啡机状态可视化面板 ====================
  - type: picture-elements
    elements:
      # ---- 隐藏的状态徽章 ----
      - type: conditional
        conditions: []
        elements:
          - entity: sensor.ka_pei_zi_you_yi_zhi_zuo_bei_shu
            type: state-badge
            style:
              top: 25%
              left: 55%
              font-size: 0.8em
              color: rgba(0,0,0,0)
          - entity: sensor.ka_pei_zi_you_dang_qian_qing_ji_fen
            type: state-badge
            style:
              top: 25%
              left: 22%
              font-size: 0.8em
              color: rgba(0,0,0,0)
          - entity: sensor.ka_pei_zi_you_ka_pei_ji_zhuang_tai
            type: state-badge
            style:
              top: 14%
              left: 25%
              font-size: 0.8em
              color: rgba(0,0,0,0)

      # ---- 电源按钮（在线 → 关机） ----
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.ka_pei_zi_you_ka_pei_ji_zhuang_tai
            state: 在线
        elements:
          - type: icon
            style:
              left: 45%
              top: 10%
              color: orange
            icon: fas:power-off
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.ka_pei_zi_you_guan_ji
              data: {}

      - entity: sensor.ka_pei_zi_you_she_bei_zhuang_tai
        type: state-badge
        style:
          top: 14%
          left: 35%
          font-size: 0.8em
          color: rgba(0,0,0,0)

      # ---- 电源按钮（休眠 → 开机） ----
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.ka_pei_zi_you_ka_pei_ji_zhuang_tai
            state: 休眠
        elements:
          - type: icon
            style:
              left: 45%
              top: 10%
            icon: fas:power-off
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.ka_pei_zi_you_kai_ji
              data: {}

      # ---- 部件异常告警 ----
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.ka_pei_zi_you_shui_wen
            state: 异常
        elements:
          - type: state-badge
            style:
              left: 40%
              top: 40%
              name: 水温
            entity: sensor.ka_pei_zi_you_shui_wen

      - type: conditional
        conditions:
          - condition: state
            entity: sensor.ka_pei_zi_you_xu_shui_pan
            state: 异常
        elements:
          - type: state-badge
            style:
              left: 35%
              top: 80%
              name: 蓄水盘
            entity: sensor.ka_pei_zi_you_xu_shui_pan

      - type: conditional
        conditions:
          - condition: state
            entity: sensor.ka_pei_zi_you_nai_pao_qi
            state: 异常
        elements:
          - type: state-badge
            style:
              left: 20%
              top: 65%
              name: 奶泡器
            entity: sensor.ka_pei_zi_you_nai_pao_qi

      - type: conditional
        conditions:
          - condition: state
            entity: sensor.ka_pei_zi_you_shui_xiang
            state: 异常
        elements:
          - type: state-badge
            style:
              left: 77%
              top: 35%
              name: 水箱
            entity: sensor.ka_pei_zi_you_shui_xiang

      - type: conditional
        conditions:
          - condition: state
            entity: sensor.ka_pei_zi_you_dou_cang
            state: 异常
        elements:
          - type: state-badge
            style:
              left: 77%
              top: 10%
              name: 豆仓
            entity: sensor.ka_pei_zi_you_dou_cang

      # ---- 童锁按钮 ----
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.ka_pei_zi_you_tong_suo
            state: 开启
        elements:
          - type: icon
            style:
              left: 52%
              top: 10%
              color: orange
            icon: fas:lock
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.ka_pei_zi_you_kai_suo
              data: {}

      - type: conditional
        conditions:
          - condition: state
            entity: sensor.ka_pei_zi_you_tong_suo
            state: 关闭
        elements:
          - type: icon
            style:
              left: 52%
              top: 10%
            icon: fas:lock
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.ka_pei_zi_you_guan_suo
              data: {}

    image:
      media_content_id: media-source://image_upload/your_image_id
      media_content_type: image/png
    card_mod:
      style: |
        ha-card {
          box-shadow: none !important;
          background: none !important;
          border: none !important;
        }

  # ==================== 设备消息 ====================
  - type: custom:mushroom-template-card
    secondary: "{{ states('sensor.ka_pei_zi_you_she_bei_xiao_xi') }}"
    icon: mdi:message-alert
    features_position: bottom
    entity: sensor.ka_pei_zi_you_she_bei_xiao_xi
    primary: 设备消息

  # ==================== 节省金额 ====================
  - type: entity
    entity: sensor.ka_pei_zi_you_bi_ka_pei_dian_jie_sheng
    name: 比咖啡店节省

  # ==================== 累计用量 ====================
  - show_name: true
    show_icon: true
    show_state: true
    type: glance
    entities:
      - entity: sensor.ka_pei_zi_you_lei_ji_ka_pei_dou
        name: 累计咖啡豆
      - entity: sensor.ka_pei_zi_you_lei_ji_niu_nai
        name: 累计牛奶
      - entity: sensor.ka_pei_zi_you_lei_ji_shui_liang
        name: 累计水量

  # ==================== 清洁分仪表盘 ====================
  - entity: sensor.ka_pei_zi_you_dang_qian_qing_ji_fen
    max: 100
    min: 0
    severity:
      green: 60
      yellow: 75
      red: 90
    type: gauge
    name: 当前清洁分

  # ==================== 清洗进度条 ====================
  - entities:
      - icon: mdi:cup
        entity: sensor.ka_pei_zi_you_nai_mo_qi_qing_xi
        name: 奶沫器清洗
      - icon: mdi:barrel
        name: 冲泡器清洗
        entity: sensor.ka_pei_zi_you_chong_pao_qi_qing_xi
      - entity: sensor.ka_pei_zi_you_chu_gou_qing_xi
        name: 除垢清洗
        icon: mdi:water-pump
    show_header_toggle: false
    type: custom:bar-card
    severity:
      - color: Red
        to: "25"
        from: "0"
      - color: Orange
        from: "26"
        to: "50"
      - color: Green
        from: "51"
        to: "100"
    direction: right
    columns: "1"
    icon: mdi:broom

  # ==================== 制作杯数趋势图 ====================
  - entities:
      - entity: sensor.ka_pei_zi_you_yi_zhi_zuo_bei_shu
        name: 累计制作
      - entity: sensor.ka_pei_zi_you_hei_ka
        name: 黑咖
      - entity: sensor.ka_pei_zi_you_nai_ka
        name: 奶咖
      - entity: sensor.ka_pei_zi_you_qi_ta_yin_liao
        name: 其他饮料
        show_indicator: false
        show_legend: false
        show_line: false
        show_points: false
        show_state: false
        y_axis: secondary
    show:
      labels: true
    type: custom:mini-graph-card